# Example nginx site for EC2 — serves frontend and proxies /api to Node.
# Install: sudo cp deploy/nginx-wc26.conf /etc/nginx/sites-available/wc26
#          sudo ln -sf /etc/nginx/sites-available/wc26 /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# TLS: sudo certbot --nginx -d wc26.kanhans.com

server {
    listen 80;
    server_name wc26.kanhans.com;

    root /var/www/wc26/frontend/dist;
    index index.html;

    # SPA — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for JWT auth after moving off Azure SWA
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Access-Token $http_x_access_token;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
